<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>eBay Style Gun Listing – Prank</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5dc;
    }
    header {
        background: #fff;
        padding: 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        font-size: 28px;
        font-weight: bold;
        text-align: center;
    }
    .container {
        max-width: 1100px;
        margin: 40px auto;
        padding: 20px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .products {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
    }
    .card {
        width: 300px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background: #fafafa;
        padding: 15px;
        text-align: center;
    }
    .card img {
        width: 100%;
        border-radius: 10px;
    }
    button {
        padding: 12px 18px;
        background: #0073e6;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
        font-size: 16px;
        font-weight: bold;
    }
    button:hover {
        background: #005bb5;
    }
    /* Modal */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }
    .modal-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 3px 12px rgba(0,0,0,0.2);
    }
    .close-btn {
        margin-top: 15px;
        background: #e60000;
    }
</style>
</head>
<body>
<header>🔥 eBay Verified Store – Gun Listings</header>

<div class="container">
    <h2 style="margin-bottom:20px;">Latest Deals</h2>
    <div class="products">

        <div class="card">
            <img src="https://placehold.co/300x200" alt="gun1">
            <h3>Laser AR‑9000</h3>
            <p>₹12,499 — Free Shipping</p>
            <button class="claim">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="gun2">
            <h3>Shadow Sniper‑X</h3>
            <p>₹18,999 — Fast Delivery</p>
            <button class="claim">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="gun3">
            <h3>Thunder Pistol Mk II</h3>
            <p>₹7,999 — Cash on Delivery</p>
            <button class="claim">Buy Now</button>
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2>😂 PRANKED!</h2>
        <p>No guns. No checkout. No shipping. This was all a prank.</p>
        <button class="close-btn" id="close">OK</button>
    </div>
</div>

<script>
    const modal = document.getElementById("modal");
    const closeBtn = document.getElementById("close");
    const claimBtns = document.querySelectorAll(".claim");

    claimBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            modal.style.display = "flex";
        });
    });

    closeBtn.addEventListener("click", () => {
        modal.style.display = "none";
    });
</script>
</body>
</html>
