<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octahedron Physics</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="info">Rotating Octahedron with Physics Simulation</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, octahedron, balls = [], wireframe;
        let rotationSpeed = 0.01;
        const gravity = new THREE.Vector3(0, -0.0005, 0);
        const restitution = 0.8;
        const friction = 0.98;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const octaGeometry = new THREE.OctahedronGeometry(2, 0);
            const octaMaterial = new THREE.MeshPhongMaterial({
                color: 0x44aaff,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            octahedron = new THREE.Mesh(octaGeometry, octaMaterial);
            scene.add(octahedron);

            const wireframeGeo = new THREE.EdgesGeometry(octaGeometry);
            const wireframeMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
            wireframe = new THREE.LineSegments(wireframeGeo, wireframeMat);
            octahedron.add(wireframe);

            const ballColors = [0xff4444, 0x44ff44, 0xffff44];
            for (let i = 0; i < 3; i++) {
                const ballGeo = new THREE.SphereGeometry(0.2, 32, 32);
                const ballMat = new THREE.MeshPhongMaterial({ color: ballColors[i] });
                const ball = new THREE.Mesh(ballGeo, ballMat);
                
                ball.position.set(
                    (Math.random() - 0.5) * 1.5,
                    (Math.random() - 0.5) * 1.5,
                    (Math.random() - 0.5) * 1.5
                );
                
                ball.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02
                );
                
                octahedron.add(ball);
                balls.push(ball);
            }

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            window.addEventListener('resize', onWindowResize);
        }

        function getOctahedronFaces() {
            return [
                { normal: new THREE.Vector3(1, 1, 1).normalize(), distance: 2 / Math.sqrt(3) },
                { normal: new THREE.Vector3(-1, 1, 1).normalize(), distance: 2 / Math.sqrt(3) },
                { normal: new THREE.Vector3(1, -1, 1).normalize(), distance: 2 / Math.sqrt(3) },
                { normal: new THREE.Vector3(-1, -1, 1).normalize(), distance: 2 / Math.sqrt(3) },
                { normal: new THREE.Vector3(1, 1, -1).normalize(), distance: 2 / Math.sqrt(3) },
                { normal: new THREE.Vector3(-1, 1, -1).normalize(), distance: 2 / Math.sqrt(3) },
                { normal: new THREE.Vector3(1, -1, -1).normalize(), distance: 2 / Math.sqrt(3) },
                { normal: new THREE.Vector3(-1, -1, -1).normalize(), distance: 2 / Math.sqrt(3) }
            ];
        }

        function checkCollisionWithOctahedron(ball) {
            const faces = getOctahedronFaces();
            const ballRadius = 0.2;
            
            for (let face of faces) {
                const distanceToPlane = ball.position.dot(face.normal);
                
                if (distanceToPlane > face.distance - ballRadius) {
                    ball.position.addScaledVector(face.normal, face.distance - ballRadius - distanceToPlane);
                    
                    const velocityAlongNormal = ball.velocity.dot(face.normal);
                    if (velocityAlongNormal > 0) {
                        ball.velocity.addScaledVector(face.normal, -velocityAlongNormal * (1 + restitution));
                    }
                }
            }
        }

        function checkBallCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const ball1 = balls[i];
                    const ball2 = balls[j];
                    const distance = ball1.position.distanceTo(ball2.position);
                    const minDistance = 0.4;
                    
                    if (distance < minDistance) {
                        const collisionNormal = new THREE.Vector3()
                            .subVectors(ball2.position, ball1.position)
                            .normalize();
                        
                        const overlap = minDistance - distance;
                        ball1.position.addScaledVector(collisionNormal, -overlap / 2);
                        ball2.position.addScaledVector(collisionNormal, overlap / 2);
                        
                        const relativeVelocity = new THREE.Vector3()
                            .subVectors(ball1.velocity, ball2.velocity);
                        const velocityAlongNormal = relativeVelocity.dot(collisionNormal);
                        
                        if (velocityAlongNormal > 0) {
                            const impulse = collisionNormal.multiplyScalar(velocityAlongNormal * (1 + restitution));
                            ball1.velocity.sub(impulse.clone().multiplyScalar(0.5));
                            ball2.velocity.add(impulse.clone().multiplyScalar(0.5));
                        }
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            octahedron.rotation.x += rotationSpeed;
            octahedron.rotation.y += rotationSpeed * 1.3;

            const inverseRotation = new THREE.Matrix4();
            inverseRotation.extractRotation(octahedron.matrix).invert();
            const worldGravity = gravity.clone().applyMatrix4(inverseRotation);

            balls.forEach(ball => {
                ball.velocity.add(worldGravity);
                ball.velocity.multiplyScalar(friction);
                ball.position.add(ball.velocity);
                
                checkCollisionWithOctahedron(ball);
            });

            checkBallCollisions();

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
        animate();
    </script>
</body>
</html>
