<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeletal Reptile Cursor Follower</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            cursor: none;
        }

        #canvas {
            display: block;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #4a9d6f;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(74, 157, 111, 0.5);
        }
    </style>
</head>
<body>
    <div class="info">Move your cursor to guide the skeletal reptile</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        // Reptile skeleton segments
        class Segment {
            constructor(x, y, length, angle) {
                this.x = x;
                this.y = y;
                this.length = length;
                this.angle = angle;
                this.targetAngle = angle;
            }

            follow(tx, ty) {
                const dx = tx - this.x;
                const dy = ty - this.y;
                this.targetAngle = Math.atan2(dy, dx);
                
                // Smooth rotation
                let diff = this.targetAngle - this.angle;
                if (diff > Math.PI) diff -= Math.PI * 2;
                if (diff < -Math.PI) diff += Math.PI * 2;
                this.angle += diff * 0.15;

                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > this.length) {
                    this.x = tx - Math.cos(this.angle) * this.length;
                    this.y = ty - Math.sin(this.angle) * this.length;
                }
            }

            setPosition(x, y) {
                this.x = x;
                this.y = y;
            }

            getEndPoint() {
                return {
                    x: this.x + Math.cos(this.angle) * this.length,
                    y: this.y + Math.sin(this.angle) * this.length
                };
            }
        }

        // Create skeleton segments
        const numSegments = 25;
        const segmentLength = 20;
        const segments = [];
        
        for (let i = 0; i < numSegments; i++) {
            segments.push(new Segment(canvas.width / 2, canvas.height / 2, segmentLength, 0));
        }

        function drawSkull(x, y, angle, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            // Skull
            ctx.strokeStyle = '#b8b8b8';
            ctx.lineWidth = 2;
            ctx.fillStyle = '#1a1a1a';
            
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 1.5, size, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Eye sockets
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(-size * 0.5, -size * 0.2, size * 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(size * 0.2, -size * 0.2, size * 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Jaw/snout
            ctx.strokeStyle = '#b8b8b8';
            ctx.beginPath();
            ctx.moveTo(size * 1.5, 0);
            ctx.lineTo(size * 2.5, size * 0.2);
            ctx.lineTo(size * 2.5, -size * 0.2);
            ctx.closePath();
            ctx.stroke();
            
            // Teeth
            for (let i = 0; i < 5; i++) {
                const tx = size * 1.5 + (i * size * 0.25);
                ctx.beginPath();
                ctx.moveTo(tx, size * 0.2);
                ctx.lineTo(tx + size * 0.1, size * 0.5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(tx, -size * 0.2);
                ctx.lineTo(tx + size * 0.1, -size * 0.5);
                ctx.stroke();
            }
            
            ctx.restore();
        }

        function drawRibCage(x, y, angle, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            ctx.strokeStyle = '#999999';
            ctx.lineWidth = 1.5;
            
            // Spine segment
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.4, 0, Math.PI * 2);
            ctx.stroke();
            
            // Ribs
            const ribLength = size * 1.2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-Math.cos(Math.PI / 4) * ribLength, -Math.sin(Math.PI / 4) * ribLength);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-Math.cos(Math.PI / 4) * ribLength, Math.sin(Math.PI / 4) * ribLength);
            ctx.stroke();
            
            ctx.restore();
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Head follows cursor
            segments[0].follow(mouseX, mouseY);
            
            // Each segment follows the previous
            for (let i = 1; i < segments.length; i++) {
                const prev = segments[i - 1].getEndPoint();
                segments[i].follow(prev.x, prev.y);
            }

            // Draw spine
            ctx.strokeStyle = '#888888';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(segments[0].x, segments[0].y);
            for (let i = 0; i < segments.length; i++) {
                const end = segments[i].getEndPoint();
                ctx.lineTo(end.x, end.y);
            }
            ctx.stroke();

            // Draw skull at head
            const head = segments[0];
            drawSkull(head.x, head.y, head.angle, 12);

            // Draw ribs along body
            for (let i = 2; i < segments.length - 5; i += 3) {
                const seg = segments[i];
                drawRibCage(seg.x, seg.y, seg.angle, 8);
            }

            // Draw tail bones
            for (let i = Math.max(0, segments.length - 8); i < segments.length; i++) {
                const seg = segments[i];
                const size = 6 * (1 - i / segments.length);
                ctx.strokeStyle = '#777777';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(seg.x, seg.y, size, 0, Math.PI * 2);
                ctx.stroke();
            }

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
